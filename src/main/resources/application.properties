spring.application.name=demo
spring.jpa.hibernate.ddl-auto=update

# 1. Standard Kafka Broker Target
spring.kafka.bootstrap-servers=localhost:9092

# 2. Key and Value Serializers (JSON is highly recommended for event bodies)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# 3. Spring Modulith Outbox Execution Engine Tuning
# Ensures events are safely logged into the database EVENT_PUBLICATION table before hitting Kafka
spring.modulith.events.externalization.enabled=true
